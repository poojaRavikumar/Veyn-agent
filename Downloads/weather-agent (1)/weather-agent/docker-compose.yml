version: "3.9"

# One-command spin-up for all three services.
# Each service has its own Dockerfile for reproducible, isolated builds.
#
# Usage:
#   1. Copy each .env.example to .env and fill in real API keys
#   2. docker-compose up --build

services:

  # ── MCP Server ──────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./mcp-server/.env
    environment:
      - ALLOWED_ORIGIN=http://backend:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Agent Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - MCP_SERVER_URL=http://mcp-server:3000
      - ALLOWED_ORIGIN=http://localhost:5173
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
